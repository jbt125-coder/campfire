<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fireside 🔥</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Georgia',serif; }
canvas { display:block; touch-action:none; position:fixed; inset:0; }

/* Color picker panel */
#colorPanel {
position:fixed; bottom:0; left:0; right:0; z-index:20;
padding:14px 16px 24px;
background:linear-gradient(0deg,#000000ee,#00000099,transparent);
display:flex; flex-direction:column; align-items:center; gap:10px;
transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
pointer-events:none;
}
#colorPanel.open { transform:translateY(0); pointer-events:all; }

#colorPanel h3 { color:#ffcc66; font-size:0.85rem; letter-spacing:3px; text-transform:uppercase; text-shadow:0 0 10px #ff6600; margin-bottom:2px; }

.color-row { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; }

.color-chip {
width:44px; height:44px; border-radius:50%; border:2px solid transparent;
cursor:pointer; display:flex; align-items:center; justify-content:center;
font-size:0.7rem; color:#fff; font-weight:bold; transition:transform 0.15s, border-color 0.15s;
box-shadow:0 2px 10px #00000088;
}
.color-chip:active { transform:scale(0.88); }
.color-chip.active { border-color:#fff; transform:scale(1.15); box-shadow:0 0 16px #ffffff88; }

#aiChip {
width:auto; border-radius:30px; padding:0 16px; gap:5px;
background:linear-gradient(135deg,#330066,#660033,#003366);
border:2px solid #9944ff44;
}
#aiChip.active { border-color:#cc88ff; box-shadow:0 0 20px #9944ff88; }

/* Tap hint */
#tapHint {
position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
color:#ffffff44; font-size:0.78rem; letter-spacing:2px; text-transform:uppercase;
pointer-events:none; transition:opacity 0.5s;
text-shadow:0 1px 4px #000;
}
#tapHint.hidden { opacity:0; }

/* ══ MODE MENU ══ */
#modeMenu {
position:fixed; inset:0; z-index:30;
display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
background:rgba(0,0,0,0.55); backdrop-filter:blur(3px);
opacity:0; pointer-events:none;
transition:opacity 0.3s ease;
}
#modeMenu.open { opacity:1; pointer-events:all; }
#modeMenu h2 {
color:#ffcc66; font-size:clamp(1.4rem,5vw,2rem);
text-shadow:0 0 30px #ff6600,0 0 60px #ff3300;
letter-spacing:3px; margin-bottom:6px;
}
.mode-btn {
display:flex; align-items:center; gap:14px;
background:rgba(0,0,0,0.7); border:1.5px solid #ff660066;
border-radius:16px; padding:14px 28px; cursor:pointer;
color:#fff; font-family:Georgia,serif; font-size:clamp(1rem,3.5vw,1.3rem);
min-width:220px; transition:border-color 0.2s, background 0.2s;
}
.mode-btn:hover, .mode-btn:active { border-color:#ff6600; background:rgba(255,80,0,0.18); }
.mode-btn .mb-icon { font-size:1.8rem; }
.mode-btn .mb-text { display:flex; flex-direction:column; }
.mode-btn .mb-title { font-weight:bold; color:#ffcc66; }
.mode-btn .mb-sub { font-size:0.75rem; color:#ffaa6699; margin-top:2px; }
.menu-close { color:#ffffff44; font-size:0.75rem; letter-spacing:2px; margin-top:8px; cursor:pointer; }

/* ══ GAME OVERLAY ══ */
#gameOverlay {
position:fixed; inset:0; z-index:25;
pointer-events:none;
display:none;
}
#gameOverlay.active { display:block; }

/* top strip: commentary + points */
#gameHud {
position:absolute; top:0; left:0; right:0;
display:flex; align-items:stretch; min-height:44px;
background:linear-gradient(180deg,#000000cc,transparent);
pointer-events:none;
}
#gameCommentary {
flex:1; display:flex; align-items:center; padding:6px 14px;
color:#ffeecc; font-size:clamp(0.68rem,2.5vw,0.88rem);
font-style:italic; text-shadow:1px 1px 6px #000;
}
#gameScores {
display:flex; align-items:center; gap:10px; padding:6px 12px; flex-shrink:0;
}
.score-badge {
color:#ffcc66; font-size:0.8rem; font-weight:bold;
text-shadow:0 0 8px #ff6600; white-space:nowrap;
}

/* cook bar per player — sits above their food on canvas */
/* drawn on canvas, not HTML */

/* bottom-left back button */
#gameBackBtn {
position:absolute; bottom:16px; left:16px;
background:rgba(0,0,0,0.7); border:1px solid #ff660066;
border-radius:10px; padding:8px 16px;
color:#ffaa44; font-family:Georgia,serif; font-size:0.82rem;
cursor:pointer; pointer-events:all;
}

/* food load buttons — P1 bottom-left area, P2 bottom-right area */
#p1FoodBtn {
position:absolute; bottom:16px; left:50%; transform:translateX(-140px);
pointer-events:all;
}
#p2FoodBtn {
position:absolute; bottom:16px; left:50%; transform:translateX(40px);
pointer-events:all;
}
.food-load-btn {
background:linear-gradient(135deg,#1a4a1a,#2d7a2d);
border:2px solid #44cc44; border-radius:12px;
padding:8px 14px; cursor:pointer;
color:#ccffcc; font-family:Georgia,serif; font-size:0.78rem; font-weight:bold;
display:flex; align-items:center; gap:7px; white-space:nowrap;
transition:transform 0.1s;
}
.food-load-btn:active { transform:scale(0.92); }
.food-load-btn.loaded {
background:linear-gradient(135deg,#4a1a00,#aa3300);
border-color:#ff6644; color:#ffccaa;
}
.food-load-btn .flb-icon { font-size:1.3rem; }
</style>

</head>
<body>
<canvas id="c"></canvas>

<!-- MODE MENU (tap canvas to open) -->

<div id="modeMenu">
  <h2>🔥 Fireside</h2>
  <div class="mode-btn" onclick="enterScreensaver()">
    <span class="mb-icon">🌙</span>
    <span class="mb-text">
      <span class="mb-title">Screensaver</span>
      <span class="mb-sub">Watch the fire & sky</span>
    </span>
  </div>
  <div class="mode-btn" onclick="enterGame()">
    <span class="mb-icon">🍡</span>
    <span class="mb-text">
      <span class="mb-title">Roasting Game</span>
      <span class="mb-sub">2 players — toast marshmallows</span>
    </span>
  </div>
  <div class="menu-close" onclick="closeMenu()">TAP OUTSIDE TO CLOSE</div>
</div>

<!-- GAME OVERLAY -->

<div id="gameOverlay">
  <div id="gameHud">
    <div id="gameCommentary">🔥 Hold your stick over the fire to start cooking!</div>
    <div id="gameScores">
      <span class="score-badge" id="p1Score">P1: 0</span>
      <span class="score-badge" id="p2Score">P2: 0</span>
    </div>
  </div>
  <button id="gameBackBtn" onclick="exitGame()">← Exit</button>
  <button id="p1FoodBtn" class="food-load-btn" onclick="toggleFood(1)">
    <span class="flb-icon" id="p1FoodIcon">🍡</span>
    <span id="p1FoodLabel">Load P1</span>
  </button>
  <button id="p2FoodBtn" class="food-load-btn" onclick="toggleFood(2)">
    <span class="flb-icon" id="p2FoodIcon">🍡</span>
    <span id="p2FoodLabel">Load P2</span>
  </button>
</div>

<div id="tapHint">TAP TO CHANGE FLAME COLOR</div>

<div id="colorPanel">
  <h3>🔥 Flame Color</h3>
  <div class="color-row">
    <div class="color-chip active" id="chip-natural" style="background:radial-gradient(#ffee00,#ff6600,#cc2200);" onclick="setFlame('natural')" title="Natural">🔥</div>
    <div class="color-chip" id="chip-blue"    style="background:radial-gradient(#88eeff,#2288ff,#001888);" onclick="setFlame('blue')" title="Blue">💙</div>
    <div class="color-chip" id="chip-green"   style="background:radial-gradient(#aaff66,#22cc22,#004400);" onclick="setFlame('green')" title="Green">💚</div>
    <div class="color-chip" id="chip-purple"  style="background:radial-gradient(#ee88ff,#aa22ee,#330044);" onclick="setFlame('purple')" title="Purple">💜</div>
    <div class="color-chip" id="chip-teal"    style="background:radial-gradient(#88ffee,#00ccaa,#003322);" onclick="setFlame('teal')" title="Teal">🩵</div>
    <div class="color-chip" id="chip-gold"    style="background:radial-gradient(#ffffff,#ffdd00,#aa7700);" onclick="setFlame('gold')" title="Gold">⭐</div>
    <div class="color-chip" id="chip-red"     style="background:radial-gradient(#ffaa88,#ff2200,#550000);" onclick="setFlame('red')" title="Red">❤️</div>
    <div class="color-chip" id="chip-rainbow" style="background:conic-gradient(red,orange,yellow,green,blue,purple,red);" onclick="setFlame('rainbow')" title="Rainbow">🌈</div>
    <div class="color-chip" id="chip-ai" style="background:linear-gradient(135deg,#330066,#660033,#003366);border:2px solid #9944ff55;" onclick="setFlame('ai')" title="AI Mode">✨ AI</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

// ── Resize ──
function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', ()=>{ resize(); initMoon(); });
resize();

// ── Global state ──
const ST = {
  flameMode: 'natural',
  aiHue: 0,
  aiTargetHue: 0,
  panelOpen: false,
  // weather
  weather: 'clear',   // clear | storm | clearing
  weatherTimer: 0,
  weatherDuration: 0,
  windStrength: 0,
  lightningTimer: 0,
  lightningFlash: 0,
  // fire
  fireIntensity: 1.0,
  fireTargetIntensity: 1.0,
  // moon
  moonX: 0, moonY: 0, moonR: 0,
  moonEvent: 'none',  // none|witch|bat|bird|asteroid|wink|manblink
  moonEventTimer: 0,
  moonEventDuration: 0,
  moonDamage: 0,       // 0-1 from asteroid
  moonRestoring: false,
  // clouds
  clouds: [],
  // stars
  stars: [],
  // birds
  birds: [],
  // fireworks
  fireworks: [],
  fwTimer: 0,
  // particles
  particles: [],
  sparks: [],
  // crackling
  audioCtx: null,
  crackTimer: 0,
};

// ── Flame colour palettes ──
const PALETTES = {
  natural: [[255,240,50],[255,160,20],[220,80,10],[180,40,5]],
  blue:    [[140,220,255],[40,120,255],[10,50,200],[5,20,120]],
  green:   [[160,255,100],[40,220,60],[10,160,30],[5,80,15]],
  purple:  [[230,100,255],[160,30,220],[90,10,170],[50,5,100]],
  teal:    [[100,255,230],[0,200,180],[0,130,110],[0,60,50]],
  gold:    [[255,255,180],[255,220,40],[200,150,0],[130,80,0]],
  red:     [[255,200,150],[255,60,20],[200,10,5],[120,5,5]],
  rainbow: null, // dynamic
  ai:      null, // dynamic
};

function getFlameColor(life, cp, ts, extraHue){
  const m = ST.flameMode;
  if(m==='rainbow' || m==='ai'){
    const base = m==='ai' ? ST.aiHue : (ts/600 + cp) * 57.3;
    const h = (base + cp*40 + extraHue) % 360;
    const s = 100, l = 40 + 30*life;
    return `hsla(${h},${s}%,${l}%,${life})`;
  }
  const pal = PALETTES[m] || PALETTES.natural;
  const idx = Math.min(~~((1-life)*pal.length), pal.length-1);
  const [r,g,b] = pal[idx];
  return `rgba(${r},${g},${b},${life})`;
}

// ── Stars ──
function initStars(){
  ST.stars = [];
  for(let i=0;i<220;i++){
    ST.stars.push({
      x: Math.random()*W,
      y: Math.random()*H*0.75,
      r: Math.random()*1.6+0.3,
      twinkle: Math.random()*Math.PI*2,
      speed: Math.random()*0.04+0.01,
      layer: Math.floor(Math.random()*3), // 0=far,1=mid,2=near (parallax)
    });
  }
}

// ── Clouds ──
function spawnCloud(fromRight){
  const y = H*(0.05 + Math.random()*0.35);
  ST.clouds.push({
    x: fromRight ? W + 200 : -200,
    y,
    w: 180 + Math.random()*260,
    h: 60 + Math.random()*80,
    speed: fromRight ? -(0.18 + Math.random()*0.22) : (0.18 + Math.random()*0.22),
    alpha: 0.55 + Math.random()*0.35,
    puffs: Array.from({length:5+~~(Math.random()*4)},()=>({
      ox: (Math.random()-0.5)*160, oy: (Math.random()-0.3)*40,
      r: 35 + Math.random()*55,
    })),
  });
}

// ── Birds ──
function spawnBird(){
  const fromRight = Math.random()<0.5;
  const y = H*(0.1 + Math.random()*0.28);
  ST.birds.push({
    x: fromRight ? W+60 : -60,
    y,
    speed: (fromRight?-1:1)*(0.8+Math.random()*1.2),
    wingPhase: Math.random()*Math.PI*2,
    size: 8+Math.random()*10,
  });
}

// ── Fireworks ──
function launchFirework(){
  const x = W*0.2 + Math.random()*W*0.6;
  const targetY = H*0.05 + Math.random()*H*0.3;
  ST.fireworks.push({
    phase: 'rising', // rising|burst
    x, y: H*0.55, targetY,
    vy: -(H*0.55 - targetY) / 55,
    hue: Math.random()*360,
    particles: [],
    timer: 0,
  });
}

// ── Moon ──
function initMoon(){
  const landscape = W > H;
  // always top-right regardless of orientation
  ST.moonR = Math.min(W,H) * (landscape ? 0.08 : 0.072);
  ST.moonX = W - ST.moonR * 2.2;
  ST.moonY = ST.moonR * 1.8;
}

// schedule next moon event
let moonEventCooldown = 0;
function scheduleMoonEvent(){
  moonEventCooldown = 8000 + Math.random()*18000;
}
scheduleMoonEvent();

const MOON_EVENTS = ['witch','bat','bird_fly','asteroid','wink','man'];

// ── Audio ──
function initAudio(){
  if(ST.audioCtx) return;
  ST.audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  playFireLoop();
}
function playFireLoop(){
  const ac = ST.audioCtx;
  const len = ac.sampleRate*2;
  const buf = ac.createBuffer(1,len,ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*0.08;
  const src=ac.createBufferSource(); src.buffer=buf; src.loop=true;
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=350;
  const g=ac.createGain(); g.gain.value=0.25;
  src.connect(f); f.connect(g); g.connect(ac.destination); src.start();
}
function playCrackle(){
  if(!ST.audioCtx) return;
  const ac=ST.audioCtx;
  const dur=0.06+Math.random()*0.12;
  const buf=ac.createBuffer(1,~~(ac.sampleRate*dur),ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*8);
  const src=ac.createBufferSource(); src.buffer=buf;
  const g=ac.createGain(); g.gain.value=0.4+Math.random()*0.4;
  src.connect(g); g.connect(ac.destination); src.start();
}
function playThunder(){
  if(!ST.audioCtx) return;
  const ac=ST.audioCtx;
  const dur=1.8;
  const buf=ac.createBuffer(1,~~(ac.sampleRate*dur),ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){
    const env=Math.exp(-i/(d.length)*4)*0.6+Math.exp(-i/(d.length)*1.2)*0.4;
    d[i]=(Math.random()*2-1)*env;
  }
  const src=ac.createBufferSource(); src.buffer=buf;
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=200;
  const g=ac.createGain(); g.gain.value=0.7;
  src.connect(f); f.connect(g); g.connect(ac.destination); src.start();
}

// ── Fire centres: 1 in portrait, 3 in landscape ──
function getFireCentres(){
  const landscape = W > H;
  if(landscape){
    return [W*0.18, W*0.5, W*0.82];
  } else {
    return [W*0.5];
  }
}

// ── Spawn fire particles ──
function spawnParticle(ts, cx){
  const spread = (W > H ? W*0.14 : W*0.40) * ST.fireIntensity;
  const speed = (Math.random()*3.5+2.0) * ST.fireIntensity;
  const scale = W > H ? W/900 : W/520;
  ST.particles.push({
    x: cx + (Math.random()-0.5)*spread*2,
    y: H-8,
    vx: (Math.random()-0.5)*3.5 + ST.windStrength*0.5,
    vy: -speed,
    life: 1,
    decay: Math.random()*0.018+0.016,
    size: (Math.random()*48+18)*ST.fireIntensity*scale,
    cp: Math.random()*Math.PI*2,
    ts,
  });
}
function spawnSpark(cx){
  const spread = (W > H ? W*0.12 : W*0.38)*ST.fireIntensity;
  ST.sparks.push({
    x: cx+(Math.random()-0.5)*spread*2,
    y: H-12,
    vx: (Math.random()-0.5)*8+ST.windStrength*0.4,
    vy: -(Math.random()*10+5),
    life: 1,
    decay: Math.random()*0.015+0.008,
    size: Math.random()*4+1.5,
  });
}

// ── DRAW ──
function drawSky(ts){
  // deep night sky gradient
  const g=ctx.createLinearGradient(0,0,0,H*0.8);
  if(ST.weather==='storm'){
    g.addColorStop(0,'#0a0a18'); g.addColorStop(0.5,'#0e0e22'); g.addColorStop(1,'#1a0800');
  } else {
    g.addColorStop(0,'#02020e'); g.addColorStop(0.4,'#08051a'); g.addColorStop(1,'#1a0800');
  }
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawStars(ts, scrollX){
  const paralaxMult=[0.0,0.15,0.35];
  ST.stars.forEach(s=>{
    const px = (s.x - scrollX*paralaxMult[s.layer] + W*2) % W;
    const tw=0.5+0.5*Math.sin(s.twinkle + ts*s.speed);
    ctx.save();
    if(ST.weather==='storm') ctx.globalAlpha = tw*0.2;
    else ctx.globalAlpha = tw*(0.5+0.5*s.layer/2);
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(px,s.y,s.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawMoon(ts){
  const mx=ST.moonX, my=ST.moonY, mr=ST.moonR;

  // moon glow
  if(ST.weather!=='storm'){
    const gl=ctx.createRadialGradient(mx,my,mr*0.5,mx,my,mr*3);
    gl.addColorStop(0,'rgba(255,250,220,0.12)'); gl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(mx,my,mr*3,0,Math.PI*2); ctx.fill();
  }

  // moon body
  ctx.save();
  // asteroid damage = rough crater
  if(ST.moonDamage>0 && ST.moonEvent==='asteroid'){
    // broken/cracked moon
    const crackAlpha = Math.min(1,ST.moonDamage*2);
    ctx.fillStyle=`rgba(255,248,210,${1-crackAlpha*0.6})`;
    ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
    // orange explosion glow
    ctx.globalAlpha=crackAlpha*0.8;
    const exp=ctx.createRadialGradient(mx,my,0,mx,my,mr*2.5);
    exp.addColorStop(0,'rgba(255,180,0,0.9)'); exp.addColorStop(0.4,'rgba(255,80,0,0.5)'); exp.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=exp; ctx.beginPath(); ctx.arc(mx,my,mr*2.5,0,Math.PI*2); ctx.fill();
    // debris sparks
    ctx.globalAlpha=crackAlpha;
    for(let i=0;i<8;i++){
      const a=i/8*Math.PI*2+ts/200;
      const r2=mr*(1.2+0.6*Math.sin(ts/80+i));
      ctx.fillStyle=`hsl(${30+i*8},100%,${50+20*Math.sin(ts/60+i)}%)`;
      ctx.beginPath(); ctx.arc(mx+Math.cos(a)*r2,my+Math.sin(a)*r2,3+2*Math.sin(ts/50+i),0,Math.PI*2); ctx.fill();
    }
  } else {
    // normal full moon
    const moonG=ctx.createRadialGradient(mx-mr*0.25,my-mr*0.2,mr*0.1,mx,my,mr);
    moonG.addColorStop(0,'#fffef0'); moonG.addColorStop(0.7,'#fff8d0'); moonG.addColorStop(1,'#e8d880');
    ctx.fillStyle=moonG;
    ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();

    // subtle craters
    ctx.globalAlpha=0.08;
    [[0.3,0.2,0.12],[-0.2,0.35,0.09],[0.1,-0.25,0.07],[-0.35,-0.1,0.06]].forEach(([ox,oy,r])=>{
      ctx.fillStyle='#886600';
      ctx.beginPath(); ctx.arc(mx+ox*mr,my+oy*mr,r*mr,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;

  }
  ctx.restore();

  // ── Moon events ──
  drawMoonEvent(ts, mx, my, mr);
}

function drawMoonEvent(ts, mx, my, mr){
  const ev=ST.moonEvent, prog=ST.moonEventTimer/ST.moonEventDuration;
  if(ev==='none'||prog<=0||prog>1) return;

  // x position: sweeps across moon
  const ex = mx - mr*1.5 + prog*(mr*3);

  if(ev==='witch'){
    ctx.save(); ctx.translate(ex, my - mr*0.6 + Math.sin(ts/600)*4);
    const dir = ex < mx ? 1 : -1;
    ctx.scale(dir,1);
    // broom stick
    ctx.strokeStyle='#8a5a1a'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-28,8); ctx.lineTo(28,8); ctx.stroke();
    // bristles
    ctx.fillStyle='#a07030';
    for(let i=-3;i<=3;i++){
      ctx.beginPath(); ctx.moveTo(20+i*2,8); ctx.lineTo(24+i*3,18); ctx.stroke();
    }
    // witch body
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath(); ctx.ellipse(0,-8,10,14,0,0,Math.PI*2); ctx.fill();
    // hat
    ctx.beginPath(); ctx.moveTo(-10,-18); ctx.lineTo(10,-18); ctx.lineTo(4,-42); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,-18,13,4,0,0,Math.PI*2); ctx.fill();
    // face
    ctx.fillStyle='#c8a060';
    ctx.beginPath(); ctx.arc(0,-10,6,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  if(ev==='bat'){
    ctx.save(); ctx.translate(ex, my + Math.sin(ts/200)*8);
    const wingFlap = Math.sin(ts/90)*0.6;
    ctx.fillStyle='#1a0a22';
    // body
    ctx.beginPath(); ctx.ellipse(0,0,6,4,0,0,Math.PI*2); ctx.fill();
    // wings
    [[1,-1]].forEach(([s2])=>{
      ctx.save(); ctx.scale(s2,1);
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(8,-14+wingFlap*8,22,-8+wingFlap*10,24,4);
      ctx.bezierCurveTo(18,0,8,2,0,0);
      ctx.fill();
      ctx.restore();
    });
    ctx.save(); ctx.scale(-1,1);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(8,-14+wingFlap*8,22,-8+wingFlap*10,24,4); ctx.bezierCurveTo(18,0,8,2,0,0); ctx.fill();
    ctx.restore();
    ctx.restore();
  }

  if(ev==='bat_signal'){
    ctx.save(); ctx.translate(mx, my);
    const glow=ctx.createRadialGradient(0,0,0,0,0,mr*0.8);
    glow.addColorStop(0,'rgba(255,255,180,0.25)'); glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=Math.sin(prog*Math.PI)*0.9;
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,mr*0.8,0,Math.PI*2); ctx.fill();
    // bat silhouette
    ctx.fillStyle='rgba(0,0,0,0.75)';
    ctx.save(); ctx.scale(mr*0.025,mr*0.025);
    ctx.beginPath();
    ctx.moveTo(0,-8); ctx.bezierCurveTo(-14,-22,-32,-12,-28,0); ctx.bezierCurveTo(-20,-6,-8,0,0,4);
    ctx.bezierCurveTo(8,0,20,-6,28,0); ctx.bezierCurveTo(32,-12,14,-22,0,-8);
    ctx.fill(); ctx.restore();
    ctx.restore();
  }

  if(ev==='wink' || ev==='man'){
    // fade in/out via sin envelope
    const faceAlpha = Math.sin(prog * Math.PI) * 0.82;
    ctx.save();
    ctx.globalAlpha = faceAlpha;
    ctx.fillStyle = '#6a5000';
    // left eye — wink or open
    if(ev==='wink'){
      ctx.strokeStyle='#6a5000'; ctx.lineWidth=mr*0.07;
      ctx.beginPath(); ctx.arc(mx-mr*0.22,my-mr*0.12,mr*0.09,Math.PI,Math.PI*2); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.ellipse(mx-mr*0.22,my-mr*0.12,mr*0.1,mr*0.075,0,0,Math.PI*2); ctx.fill();
    }
    // right eye
    ctx.beginPath(); ctx.ellipse(mx+mr*0.18,my-mr*0.12,mr*0.1,mr*0.075,0,0,Math.PI*2); ctx.fill();
    // mouth smile
    ctx.strokeStyle='#6a5000'; ctx.lineWidth=mr*0.06; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(mx, my+mr*0.15, mr*0.24, 0.15, Math.PI-0.15); ctx.stroke();
    ctx.restore();
  }
}

function drawClouds(ts){
  ST.clouds.forEach(cl=>{
    ctx.save(); ctx.globalAlpha=cl.alpha;
    cl.puffs.forEach(p=>{
      const g2=ctx.createRadialGradient(cl.x+p.ox,cl.y+p.oy,0,cl.x+p.ox,cl.y+p.oy,p.r);
      g2.addColorStop(0,'rgba(30,30,50,0.95)'); g2.addColorStop(0.7,'rgba(20,20,40,0.7)'); g2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(cl.x+p.ox,cl.y+p.oy,p.r,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();
  });
}

function drawBirds(ts){
  ST.birds.forEach(b=>{
    ctx.save(); ctx.translate(b.x, b.y);
    const flap=Math.sin(b.wingPhase+ts*0.003*(b.speed>0?1:-1))*b.size*0.5;
    ctx.strokeStyle='rgba(30,20,10,0.85)'; ctx.lineWidth=1.5; ctx.lineCap='round';
    // two wing arcs
    ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(-b.size*0.7,-flap,-b.size*1.4,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo( b.size*0.7,-flap, b.size*1.4,0); ctx.stroke();
    ctx.restore();
  });
}

function drawFireworks(ts){
  ST.fireworks.forEach(fw=>{
    if(fw.phase==='rising'){
      // trail
      ctx.save();
      ctx.fillStyle=`hsl(${fw.hue},100%,70%)`;
      ctx.shadowBlur=8; ctx.shadowColor=`hsl(${fw.hue},100%,60%)`;
      ctx.beginPath(); ctx.arc(fw.x, fw.y, 3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    } else {
      fw.particles.forEach(p=>{
        ctx.save(); ctx.globalAlpha=p.life;
        ctx.fillStyle=`hsl(${fw.hue+p.hueOff},100%,${50+30*p.life}%)`;
        ctx.shadowBlur=6; ctx.shadowColor=`hsl(${fw.hue},100%,60%)`;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
        // sparkle tail
        ctx.globalAlpha=p.life*0.4;
        ctx.beginPath(); ctx.arc(p.x-p.vx*3,p.y-p.vy*3,p.size*0.4*p.life,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
    }
  });
}

function drawLogsAt(cx, ts, logW){
  const fi=ST.fireIntensity;
  const ls=logW/220;
  const logs=[
    [-logW*0.55, 4, 200*ls, 17,-0.14,'#4a2000'],
    [ logW*0.18, 3, 175*ls, 15, 0.20,'#3a1800'],
    [-logW*0.12,11, 230*ls, 15, 0.04,'#5a2c00'],
    [-logW*0.78, 7, 120*ls, 13,-0.26,'#3e1800'],
    [ logW*0.52, 5, 130*ls, 13, 0.18,'#4a2200'],
  ];
  logs.forEach(([ox,oy,w,h,rot,col])=>{
    ctx.save(); ctx.translate(cx+ox,H+oy); ctx.rotate(rot);
    ctx.shadowBlur=22*fi; ctx.shadowColor='#ff4400';
    ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(0,0,w/2,h/2,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle=`rgba(255,80,0,${(0.28+0.14*Math.sin(ts/280+rot*5))*fi})`;
    ctx.beginPath(); ctx.ellipse(0,-1,w/2-3,h/2-2,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}
function drawLogs(ts){
  const centres=getFireCentres();
  const logW = W > H ? W*0.28 : W*0.85;
  centres.forEach(cx=>drawLogsAt(cx,ts,logW));
}

function drawFire(ts){
  const fi=ST.fireIntensity;
  const centres=getFireCentres();
  const glowW = W > H ? W*0.22 : W*0.5;

  // ground glow per fire
  centres.forEach(cx=>{
    const gr=ctx.createRadialGradient(cx,H,0,cx,H,glowW*fi);
    gr.addColorStop(0,`rgba(255,120,0,${0.4*fi})`);
    gr.addColorStop(0.5,`rgba(200,60,0,${0.2*fi})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;
    ctx.beginPath(); ctx.ellipse(cx,H,glowW*fi,H*0.10*fi,0,0,Math.PI*2); ctx.fill();
  });

  // spawn particles from each fire centre
  const ratePerFire = Math.max(2, ~~(8*fi));
  centres.forEach(cx=>{
    for(let i=0;i<ratePerFire;i++) spawnParticle(ts,cx);
    if(Math.random()<0.3*fi) spawnSpark(cx);
  });

  // draw all particles
  ST.particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    const g2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
    g2.addColorStop(0,getFlameColor(1,p.cp,ts,0));
    g2.addColorStop(0.5,getFlameColor(p.life*0.55,p.cp,ts,10));
    g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  ST.sparks.forEach(s=>{
    ctx.save(); ctx.globalAlpha=s.life;
    ctx.fillStyle=`rgb(255,${~~(200*s.life)},40)`;
    ctx.shadowBlur=4; ctx.shadowColor='#ffaa00';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawLightning(ts){
  if(ST.lightningFlash<=0) return;
  ctx.save(); ctx.globalAlpha=ST.lightningFlash*0.85;
  ctx.fillStyle='rgba(200,220,255,0.9)';
  ctx.fillRect(0,0,W,H);
  ctx.restore();
  // draw bolt
  if(ST.lightningFlash>0.5){
    ctx.save(); ctx.globalAlpha=ST.lightningFlash;
    ctx.strokeStyle='rgba(220,240,255,1)'; ctx.lineWidth=2+Math.random()*3; ctx.lineCap='round';
    let x=W*0.2+Math.random()*W*0.6, y=0;
    ctx.beginPath(); ctx.moveTo(x,y);
    while(y<H*0.6){
      x+=(Math.random()-0.5)*60; y+=30+Math.random()*40;
      ctx.lineTo(x,y);
    }
    ctx.shadowBlur=20; ctx.shadowColor='#aaccff';
    ctx.stroke(); ctx.restore();
  }
}

// ── UPDATE ──
function update(ts, dt){
  // AI hue drift
  if(ST.flameMode==='ai'){
    if(Math.abs(ST.aiHue-ST.aiTargetHue)<1) ST.aiTargetHue=Math.random()*360;
    ST.aiHue += (ST.aiTargetHue-ST.aiHue)*0.003*dt;
  }

  // Particles
  ST.particles.forEach(p=>{
    p.x+=p.vx+Math.sin(ts/400+p.y/60)*0.6+ST.windStrength*0.15;
    p.y+=p.vy; p.vy*=0.986; p.life-=p.decay; p.size*=0.993;
  });
  ST.particles=ST.particles.filter(p=>p.life>0);
  ST.sparks.forEach(s=>{ s.x+=s.vx+ST.windStrength*0.1; s.y+=s.vy; s.vy+=0.2; s.life-=s.decay; });
  ST.sparks=ST.sparks.filter(s=>s.life>0);

  // Crackle
  ST.crackTimer-=dt;
  if(ST.crackTimer<=0){ playCrackle(); ST.crackTimer=800+Math.random()*2200; }

  // Stars twinkle (just update phase)
  // (drawn with current ts)

  // Clouds
  ST.clouds.forEach(cl=>{ cl.x+=cl.speed*dt*0.05; });
  ST.clouds=ST.clouds.filter(cl=>cl.x>-350 && cl.x<W+350);
  if(ST.clouds.length<3 && Math.random()<0.0005*dt) spawnCloud(Math.random()<0.5);

  // Birds
  ST.birds.forEach(b=>{ b.x+=b.speed*dt*0.05; b.wingPhase+=0.08; });
  ST.birds=ST.birds.filter(b=>b.x>-100 && b.x<W+100);
  if(ST.birds.length<2 && Math.random()<0.0003*dt) spawnBird();

  // Fireworks
  ST.fwTimer-=dt;
  if(ST.fwTimer<=0){ launchFirework(); ST.fwTimer=8000+Math.random()*14000; }
  ST.fireworks.forEach(fw=>{
    if(fw.phase==='rising'){
      fw.y+=fw.vy*dt*0.06;
      if(fw.y<=fw.targetY){ fw.phase='burst'; burstFirework(fw); }
    } else {
      fw.timer+=dt;
      fw.particles.forEach(p=>{ p.x+=p.vx*dt*0.06; p.y+=p.vy*dt*0.06; p.vy+=0.04*dt*0.06; p.life-=p.decay*dt*0.06; });
      fw.particles=fw.particles.filter(p=>p.life>0);
    }
  });
  ST.fireworks=ST.fireworks.filter(fw=>fw.phase==='rising'||(fw.phase==='burst'&&fw.particles.length>0));

  // Moon events
  moonEventCooldown-=dt;
  if(moonEventCooldown<=0 && ST.moonEvent==='none' && ST.weather!=='storm'){
    const ev=MOON_EVENTS[~~(Math.random()*MOON_EVENTS.length)];
    ST.moonEvent=ev;
    ST.moonEventDuration = ev==='asteroid'?4000 : ev==='wink'?2000 : ev==='man'?3000 : 5000+Math.random()*3000;
    ST.moonEventTimer=0;
    if(ev==='asteroid') ST.moonDamage=0;
    scheduleMoonEvent();
  }
  if(ST.moonEvent!=='none'){
    ST.moonEventTimer+=dt;
    if(ST.moonEvent==='asteroid'){
      const p2=ST.moonEventTimer/ST.moonEventDuration;
      ST.moonDamage=p2<0.5 ? p2*2 : 1-(p2-0.5)*2;
    }
    if(ST.moonEventTimer>=ST.moonEventDuration){
      ST.moonEvent='none'; ST.moonDamage=0;
    }
  }

  // Weather cycle
  ST.weatherTimer+=dt;
  if(ST.weatherTimer>=ST.weatherDuration){
    ST.weatherTimer=0;
    if(ST.weather==='clear'){
      const roll=Math.random();
      if(roll<0.15){ // storm!
        ST.weather='storm'; ST.weatherDuration=12000+Math.random()*10000;
        ST.fireTargetIntensity=0.18;
        ST.windStrength=(Math.random()-0.5)*3;
        // spawn storm clouds
        for(let i=0;i<5;i++) spawnCloud(i%2===0);
      } else if(roll<0.4){ // windy
        ST.windStrength=(Math.random()-0.5)*2.5;
        ST.fireTargetIntensity=0.8+Math.random()*0.3;
        ST.weatherDuration=5000+Math.random()*8000;
      } else {
        ST.windStrength*=0.2;
        ST.fireTargetIntensity=1.0;
        ST.weatherDuration=15000+Math.random()*20000;
      }
    } else if(ST.weather==='storm'){
      ST.weather='clearing'; ST.weatherDuration=6000+Math.random()*4000;
      ST.fireTargetIntensity=0.6;
    } else { // clearing
      ST.weather='clear'; ST.weatherDuration=20000+Math.random()*30000;
      ST.fireTargetIntensity=1.0;
      ST.windStrength=0;
    }
  }

  // Lightning during storm
  if(ST.weather==='storm'){
    ST.lightningTimer-=dt;
    if(ST.lightningTimer<=0){
      ST.lightningFlash=1.0;
      ST.lightningTimer=2000+Math.random()*5000;
      playThunder();
    }
  }
  if(ST.lightningFlash>0) ST.lightningFlash=Math.max(0,ST.lightningFlash-dt*0.006);

  // Fire intensity lerp
  ST.fireIntensity+=(ST.fireTargetIntensity-ST.fireIntensity)*0.001*dt;

  // Wind drift
  ST.windStrength*=Math.pow(0.9995,dt);
}

function burstFirework(fw){
  const count=80+~~(Math.random()*60);
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const spd=1+Math.random()*4;
    fw.particles.push({
      x:fw.x, y:fw.y,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-1,
      life:1, decay:0.008+Math.random()*0.012,
      size:2+Math.random()*3, hueOff:(Math.random()-0.5)*60,
    });
  }
  // secondary ring
  for(let i=0;i<30;i++){
    const a=i/30*Math.PI*2;
    fw.particles.push({
      x:fw.x, y:fw.y,
      vx:Math.cos(a)*2.2, vy:Math.sin(a)*2.2,
      life:0.8, decay:0.014, size:1.5, hueOff:180,
    });
  }
}

// ── MAIN LOOP ──
let prevTs=0, scrollX=0;
function loop(ts){
  const dt=Math.min(ts-prevTs,80); prevTs=ts;
  ctx.clearRect(0,0,W,H);

  scrollX+=ST.windStrength*0.04*dt;

  drawSky(ts);
  drawStars(ts,scrollX);
  drawMoon(ts);
  drawClouds(ts);
  drawBirds(ts);
  drawFireworks(ts);
  drawLightning(ts);
  drawFire(ts);
  drawLogs(ts);

  update(ts, dt);
  updateGame(ts, dt);
  drawGame(ts);
  requestAnimationFrame(loop);
}

// ── Init ──
function init(){
  initStars();
  initMoon();
  // initial clouds
  spawnCloud(false); spawnCloud(true);
  // initial weather duration
  ST.weatherDuration=25000;
  ST.weather='clear';
  // start loop
  requestAnimationFrame(loop);
}

    { id:2, x:0, y:0, dragging:false, touchId:null,

      cookProgress:0, cookStage:0, lastStage:-1,
      points:0, isOnFire:false, fireIntensity:0,
      anchorX:0, anchorY:0 },
  ],
  lastCommentary: 0,
};

function startGame(){
  GM.active = true;
  document.getElementById('gameOverlay').classList.add('active');
  document.getElementById('tapHint').classList.add('hidden');
  document.getElementById('colorPanel').classList.remove('open');
  panelOpen = false;
  resetGamePlayers();
  updateScoreDisplay();
}

function exitGame(){
  GM.active = false;
  document.getElementById('gameOverlay').classList.remove('active');
  GM.players.forEach(p=>{ p.hasFoodOnStick=false; p.cookProgress=0; p.cookStage=0; p.lastStage=-1; });
  // restore hint
  if(ST.flameMode!=='ai'){
    clearTimeout(hintTimer);
    hintTimer=setTimeout(()=>document.getElementById('tapHint').classList.remove('hidden'),3000);
  }
}

function resetGamePlayers(){
  const landscape = W > H;
  // P1 anchors bottom-left area, P2 bottom-right area
  GM.players[0].anchorX = W * 0.12;
  GM.players[0].anchorY = H * 0.96;
  GM.players[0].x = W * 0.28;
  GM.players[0].y = H * 0.55;
  GM.players[1].anchorX = W * 0.88;
  GM.players[1].anchorY = H * 0.96;
  GM.players[1].x = W * 0.72;
  GM.players[1].y = H * 0.55;
}

// ── Food toggle ──
function toggleFood(pid){
  const p = GM.players[pid-1];
  if(p.hasFoodOnStick){
    servePlayerFood(p);
  } else {
    // cycle food
    const idx = FOOD_KEYS.indexOf(p.food);
    p.food = FOOD_KEYS[(idx+1)%FOOD_KEYS.length];
    p.hasFoodOnStick = true;
    p.cookProgress = 0; p.cookStage = 0; p.lastStage = -1;
    updateFoodBtn(p);
    const name = FOOD_DATA[p.food].name;
    setGameCommentary(`P${pid}: Fresh ${name} on the stick! Hold it over the fire!`);
  }
  updateFoodBtn(p);
}

function servePlayerFood(p){
  const fd = FOOD_DATA[p.food]; if(!fd) return;
  const stage = Math.min(p.cookStage,6);
  const pts = fd.pts[stage];
  p.points += pts;
  updateScoreDisplay();
  const line = fd.comments[stage][~~(Math.random()*fd.comments[stage].length)];
  setGameCommentary(`P${p.id} served: ${STAGES[stage]}! +${pts}pts — "${line}"`);
  p.hasFoodOnStick = false;
  p.cookProgress = 0; p.cookStage = 0; p.lastStage = -1;
  updateFoodBtn(p);
}

function updateFoodBtn(p){
  const icons = {marshmallow:'🍡',hotdog:'🌭',iguana:'🦎'};
  const btn = document.getElementById(`p${p.id}FoodBtn`);
  const icon = document.getElementById(`p${p.id}FoodIcon`);
  const label = document.getElementById(`p${p.id}FoodLabel`);
  if(p.hasFoodOnStick){
    btn.classList.add('loaded');
    icon.textContent = icons[p.food]||'🍡';
    label.textContent = 'Serve P'+p.id;
  } else {
    btn.classList.remove('loaded');
    icon.textContent = icons[p.food]||'🍡';
    label.textContent = 'Load P'+p.id;
  }
}

function updateScoreDisplay(){
  document.getElementById('p1Score').textContent = 'P1: '+GM.players[0].points;
  document.getElementById('p2Score').textContent = 'P2: '+GM.players[1].points;
}

function setGameCommentary(text){
  document.getElementById('gameCommentary').textContent = '💬 '+text;
  GM.lastCommentary = performance.now();
  if(window.speechSynthesis){
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text.replace(/P[12]:/,''));
    u.rate=1.1; u.pitch=1.15; u.volume=0.5;
    speechSynthesis.speak(u);
  }
}

// ── Game physics update (called from main loop) ──
function updateGame(ts, dt){
  if(!GM.active) return;
  GM.players.forEach(p=>{
    if(!p.hasFoodOnStick){ p.isOnFire=false; p.fireIntensity=0; return; }
    // fire centre(s)
    const centres = getFireCentres();
    // find closest fire to stick tip
    let minDist = Infinity;
    centres.forEach(cx=>{
      const fireTopY = H - H*0.35*ST.fireIntensity;
      const dx = p.x - cx, dy = p.y - fireTopY;
      const d = Math.sqrt(dx*dx+dy*dy);
      if(d<minDist) minDist=d;
    });
    const fireZone = H * 0.32 * ST.fireIntensity;
    p.fireIntensity = Math.max(0, 1 - minDist/fireZone);
    p.isOnFire = p.fireIntensity > 0.85;

    if(p.fireIntensity > 0.04){
      p.cookProgress = Math.min(100, p.cookProgress + p.fireIntensity*0.055*dt*0.06);
      const ns = Math.min(6, ~~(p.cookProgress/(100/6)));
      if(ns !== p.cookStage){
        p.cookStage = ns;
        if(ns !== p.lastStage){
          p.lastStage = ns;
          const fd = FOOD_DATA[p.food];
          if(fd){
            const line = fd.comments[ns][~~(Math.random()*fd.comments[ns].length)];
            setGameCommentary(`P${p.id}: ${STAGES[ns]} — "${line}"`);
          }
        }
      }
    }
  });

  // periodic idle commentary
  if(performance.now()-GM.lastCommentary > 7000){
    const idleLines = [
      "Patience is a virtue... unless your marshmallow is on fire.",
      "Is that smoke I smell? Probably fine.",
      "Pro tip: closer to the fire = faster cooking. Also faster burning.",
      "The fire doesn't judge. But I do.",
      "Someone's getting really good at this. Someone else is not.",
    ];
    setGameCommentary(idleLines[~~(Math.random()*idleLines.length)]);
  }
}

// ── Game drawing (called from main loop) ──
function drawGame(ts){
  if(!GM.active) return;
  GM.players.forEach(p=>drawPlayerStick(p, ts));
}

function drawPlayerStick(p, ts){
  const ax=p.anchorX, ay=p.anchorY;
  const skin = ST.stickSkin||'wood';

  // stick line
  ctx.save();
  ctx.lineWidth=5; ctx.lineCap='round';
  ctx.strokeStyle='#8B4513'; ctx.shadowBlur=4; ctx.shadowColor='#442200';
  ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(p.x,p.y); ctx.stroke();
  ctx.restore();

  // food or tip
  if(p.hasFoodOnStick) drawGameFood(p, ts);
  else {
    ctx.save(); ctx.fillStyle='#c8943a';
    ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // cook bar
  if(p.hasFoodOnStick && p.cookProgress>0){
    const bw=80, bh=7, bx=p.x-bw/2, by=p.y-36;
    ctx.save(); ctx.globalAlpha=0.88;
    ctx.fillStyle='#00000077';
    rrGame(bx,by,bw,bh,4); ctx.fill();
    ctx.fillStyle=STAGE_COLORS[Math.min(p.cookStage,6)];
    rrGame(bx,by,bw*(p.cookProgress/100),bh,4); ctx.fill();
    // stage label
    ctx.globalAlpha=0.9; ctx.fillStyle='#ffeecc';
    ctx.font='bold 10px Georgia'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(STAGES[Math.min(p.cookStage,6)], p.x, by-2);
    ctx.restore();
  }

  // player label near anchor
  ctx.save(); ctx.fillStyle='rgba(255,200,100,0.7)';
  ctx.font='bold 11px Georgia'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('P'+p.id, ax, ay+6);
  ctx.restore();
}

function drawGameFood(p, ts){
  const fd = FOOD_DATA[p.food]; if(!fd) return;
  const stage = Math.min(p.cookStage,6);
  const sz = 22;
  const cook = p.cookProgress/100;
  const shade = gameColorShade(fd.rawColor, cook);
  const bounce = p.isOnFire ? Math.sin(ts/65)*2 : 0;

  ctx.save();
  ctx.translate(p.x, p.y+bounce);
  if(p.isOnFire){ ctx.shadowBlur=20; ctx.shadowColor='#ff4400'; }
  ctx.fillStyle=shade; ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=1.5;

  if(fd.shape==='square'){
    rrGame(-sz/2,-sz/2,sz,sz,5); ctx.fill(); ctx.stroke();
    if(stage>=4){
      ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-sz*0.3,-sz*0.1); ctx.lineTo(sz*0.3,-sz*0.1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-sz*0.3,sz*0.15); ctx.lineTo(sz*0.3,sz*0.15); ctx.stroke();
    }
    if(p.isOnFire){ ctx.globalAlpha=0.28+0.15*Math.sin(ts/50); ctx.fillStyle='rgba(255,120,0,0.6)'; rrGame(-sz/2,-sz/2,sz,sz,5); ctx.fill(); }
  } else if(fd.shape==='rect'){
    rrGame(-sz*0.75,-sz*0.3,sz*1.5,sz*0.6,5); ctx.fill(); ctx.stroke();
    if(stage>=3){
      ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1.2;
      [-0.25,0,0.25].forEach(o=>{ ctx.beginPath(); ctx.moveTo(o*sz,-sz*0.3); ctx.lineTo(o*sz,sz*0.3); ctx.stroke(); });
    }
    if(p.isOnFire){ ctx.globalAlpha=0.25+0.12*Math.sin(ts/50); ctx.fillStyle='rgba(255,120,0,0.5)'; rrGame(-sz*0.75,-sz*0.3,sz*1.5,sz*0.6,5); ctx.fill(); }
  } else {
    // iguana
    drawGameIguana(ctx, shade, stage, ts, sz, p.isOnFire, cook);
  }
  ctx.restore();
}

function drawGameIguana(c,shade,stage,ts,sz,onFire,cook){
  const s=sz*0.9;
  const darkC=gameColorShade('#3a7030',cook*1.1);
  const bellyC=gameColorShade('#b8d460',cook*1.05);
  c.save();
  // tail
  c.strokeStyle=shade; c.lineWidth=s*0.22; c.lineCap='round';
  c.beginPath(); c.moveTo(-s*0.55,s*0.05); c.bezierCurveTo(-s*0.9,s*0.08,-s*1.2,-s*0.18,-s*1.45,s*0.28); c.stroke();
  c.lineWidth=s*0.08; c.beginPath(); c.moveTo(-s*1.45,s*0.28); c.bezierCurveTo(-s*1.6,s*0.42,-s*1.7,s*0.12,-s*1.75,0); c.stroke();
  // body
  c.fillStyle=shade; c.strokeStyle=darkC; c.lineWidth=1.2;
  c.beginPath(); c.ellipse(0,0,s*0.55,s*0.28,0,0,Math.PI*2); c.fill(); c.stroke();
  c.fillStyle=bellyC; c.beginPath(); c.ellipse(s*0.05,s*0.06,s*0.32,s*0.14,0,0,Math.PI*2); c.fill();
  // spines
  c.strokeStyle=darkC; c.lineWidth=1;
  for(let i=0;i<(stage>=5?3:6);i++){
    const bx=-s*0.3+i*(s*0.6/5), by=-s*0.26, sh=s*(0.16-Math.abs(i-2.5)*0.04);
    c.beginPath(); c.moveTo(bx,by); c.lineTo(bx-s*0.03,by-sh); c.stroke();
  }
  // legs
  [[s*0.28,s*0.24,s*0.38,s*0.46],[s*0.18,s*0.25,s*0.10,s*0.46],[-s*0.25,s*0.24,-s*0.38,s*0.46],[-s*0.15,s*0.25,-s*0.08,s*0.46]].forEach(([bx,by,ex,ey])=>{
    c.strokeStyle=shade; c.lineWidth=s*0.13; c.beginPath(); c.moveTo(bx,by); c.lineTo(ex,ey); c.stroke();
    c.strokeStyle=darkC; c.lineWidth=s*0.08;
    for(let t=-1;t<=1;t++){ c.beginPath(); c.moveTo(ex,ey); c.lineTo(ex+t*s*0.07,ey+s*0.1); c.stroke(); }
  });
  // head
  c.fillStyle=shade; c.strokeStyle=darkC; c.lineWidth=1.2;
  c.beginPath(); c.ellipse(s*0.68,-s*0.02,s*0.24,s*0.18,-0.15,0,Math.PI*2); c.fill(); c.stroke();
  c.fillStyle=shade; c.beginPath(); c.moveTo(s*0.86,-s*0.06); c.quadraticCurveTo(s*1.02,-s*0.02,s*0.96,s*0.1); c.quadraticCurveTo(s*0.88,s*0.14,s*0.76,s*0.1); c.closePath(); c.fill();
  c.strokeStyle=darkC; c.lineWidth=1; c.stroke();
  c.fillStyle=darkC; c.beginPath(); c.arc(s*0.93,-s*0.01,s*0.025,0,Math.PI*2); c.fill();
  c.strokeStyle=darkC; c.lineWidth=0.8; c.beginPath(); c.moveTo(s*0.84,s*0.06); c.quadraticCurveTo(s*0.9,s*0.1,s*0.96,s*0.07); c.stroke();
  c.fillStyle=gameColorShade('#cc6030',cook);
  c.beginPath(); c.moveTo(s*0.72,s*0.12); c.bezierCurveTo(s*0.78,s*0.26,s*0.65,s*0.28,s*0.60,s*0.16); c.closePath(); c.fill();
  c.fillStyle=stage>=6?'#333':'#fffbe0'; c.beginPath(); c.arc(s*0.7,-s*0.07,s*0.07,0,Math.PI*2); c.fill();
  c.strokeStyle=darkC; c.lineWidth=0.8; c.stroke();
  c.fillStyle=stage>=5?'#555':'#1a1a00'; c.beginPath(); c.arc(s*0.72,-s*0.07,s*0.038,0,Math.PI*2); c.fill();
  if(stage<5){ c.fillStyle='rgba(255,255,255,0.7)'; c.beginPath(); c.arc(s*0.735,-s*0.085,s*0.016,0,Math.PI*2); c.fill(); }
  if(stage>=4){
    c.strokeStyle=`rgba(0,0,0,${0.2+(stage-4)*0.15})`; c.lineWidth=1.2;
    [[s*0.1,-s*0.2,s*0.22,-s*0.05],[-s*0.15,-s*0.18,-s*0.05,-s*0.04]].forEach(([x1,y1,x2,y2])=>{ c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke(); });
  }
  if(onFire){ c.globalAlpha=0.28+0.15*Math.sin(ts/50); c.fillStyle='rgba(255,130,0,0.5)'; c.beginPath(); c.ellipse(0,0,s*0.55,s*0.28,0,0,Math.PI*2); c.fill(); }
  c.restore();
}

function gameColorShade(hex,t){
  const r0=parseInt(hex.slice(1,3),16),g0=parseInt(hex.slice(3,5),16),b0=parseInt(hex.slice(5,7),16);
  return `rgb(${~~(r0+(30-r0)*Math.min(1,t*1.1))},${~~(g0+(18-g0)*Math.min(1,t*1.1))},${~~(b0+(5-b0)*Math.min(1,t*1.1))})`;
}

function rrGame(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ── Game input handlers ──
function handleGameTouch(e){
  Array.from(e.changedTouches).forEach(t=>{
    // assign touch to player based on x position
    const p = t.clientX < W/2 ? GM.players[0] : GM.players[1];
    if(!p.dragging){ p.dragging=true; p.touchId=t.identifier; p.x=t.clientX; p.y=t.clientY; }
  });
}
function handleGameTouchMove(e){
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    GM.players.forEach(p=>{ if(p.touchId===t.identifier){ p.x=t.clientX; p.y=Math.min(t.clientY,H*0.92); } });
  });
}
function handleGameTouchEnd(e){
  Array.from(e.changedTouches).forEach(t=>{
    GM.players.forEach(p=>{ if(p.touchId===t.identifier){ p.dragging=false; p.touchId=null; } });
  });
}
function handleGameMouseDown(e){
  const p = e.clientX < W/2 ? GM.players[0] : GM.players[1];
  p.dragging=true; p.x=e.clientX; p.y=e.clientY;
}
function handleGameMouseMove(e){
  GM.players.forEach(p=>{ if(p.dragging){ p.x=e.clientX; p.y=Math.min(e.clientY,H*0.92); } });
}
function handleGameMouseUp(e){
  GM.players.forEach(p=>p.dragging=false);
}

</script>
