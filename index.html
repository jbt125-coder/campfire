<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fireside Follies 🔥</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
body { background:#000; font-family:'Georgia',serif; overflow:hidden; width:100vw; height:100vh; }
#gameCanvas { display:block; touch-action:none; position:fixed; inset:0; }
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; }
.screen.hidden { display:none; }
#titleScreen { background:radial-gradient(ellipse at 50% 85%,#8a3000 0%,#1a0800 55%,#000 100%); }
#titleScreen h1 { font-size:clamp(2.4rem,9vw,4.5rem); color:#ffcc66; text-shadow:0 0 40px #ff6600,0 0 80px #ff3300; letter-spacing:3px; text-align:center; margin-bottom:6px; }
#titleScreen .sub { color:#ffaa44; font-size:clamp(0.85rem,2.5vw,1.1rem); margin-bottom:36px; text-align:center; opacity:0.85; }
.fire-btn { background:linear-gradient(135deg,#cc3300,#ff6600,#ffaa00); border:none; border-radius:50px; padding:13px 34px; font-size:clamp(0.95rem,3.5vw,1.25rem); font-family:'Georgia',serif; color:#fff; font-weight:bold; cursor:pointer; margin:7px; box-shadow:0 4px 20px #ff660066; transition:transform 0.1s; }
.fire-btn:active { transform:scale(0.95); }
.fire-btn.secondary { background:linear-gradient(135deg,#2a2a2a,#444); box-shadow:0 4px 20px #00000066; }
#lobbyScreen { background:radial-gradient(ellipse at 50% 85%,#5a1e00,#0e0400 65%,#000 100%); }
#lobbyScreen h2 { color:#ffcc66; font-size:clamp(1.4rem,5vw,2.2rem); margin-bottom:18px; text-shadow:0 0 20px #ff6600; }
.lobby-box { background:#ffffff0e; border:1px solid #ff660044; border-radius:18px; padding:20px; width:min(92vw,370px); }
.lobby-box input { width:100%; background:#ffffff15; border:1px solid #ff6600; border-radius:8px; padding:10px 14px; font-size:1.05rem; color:#fff; margin:7px 0; font-family:'Georgia',serif; outline:none; }
.lobby-box input::placeholder { color:#ff660055; }
.code-display { font-size:2.8rem; color:#ffcc66; text-align:center; letter-spacing:10px; text-shadow:0 0 24px #ff6600; margin:14px 0; font-weight:bold; }
.players-list { margin:10px 0; }
.player-slot { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:8px; margin:3px 0; background:#ffffff08; color:#ffcc99; font-size:0.9rem; }
.player-dot { width:9px; height:9px; border-radius:50%; background:#44ff44; flex-shrink:0; }
.player-dot.empty { background:transparent; border:1px solid #ff444455; }
#lobbyStatus { color:#ff9944; font-size:0.82rem; text-align:center; margin:8px 0; min-height:18px; }
/* TOP HUD */
#topHud { position:fixed; top:0; left:0; right:0; z-index:15; pointer-events:none; display:flex; align-items:stretch; min-height:46px; background:linear-gradient(180deg,#000000cc 0%,#00000077 65%,transparent 100%); }
#topHud.hidden { display:none; }
#commentaryStrip { flex:1; display:flex; align-items:center; padding:7px 14px; color:#ffeecc; font-size:clamp(0.7rem,2.6vw,0.9rem); font-style:italic; text-shadow:1px 1px 8px #000,0 0 20px #000; line-height:1.35; }
#hudRight { display:flex; align-items:center; gap:6px; padding:6px 10px; pointer-events:all; flex-shrink:0; }
#pointsBadge { color:#ffcc66; font-size:0.8rem; font-weight:bold; text-shadow:0 0 8px #ff6600; white-space:nowrap; }
.hud-btn { background:#cc440099; border:1px solid #ff660088; border-radius:7px; padding:4px 10px; color:#ffcc66; font-size:0.75rem; cursor:pointer; white-space:nowrap; }
/* SHOP */
#shopScreen { background:#000000bb; backdrop-filter:blur(6px); }
#shopScreen .shop-box { background:#160800f0; border:1px solid #ff660088; border-radius:20px; padding:18px; width:min(96vw,400px); max-height:85vh; overflow-y:auto; }
#shopScreen h2 { color:#ffcc66; font-size:1.5rem; text-align:center; margin-bottom:10px; text-shadow:0 0 14px #ff6600; }
.shop-pts { text-align:center; color:#ffaa44; font-size:0.88rem; margin-bottom:10px; }
.shop-category { color:#ff9944; font-size:0.78rem; text-transform:uppercase; letter-spacing:2px; margin:12px 0 5px; border-bottom:1px solid #ff660022; padding-bottom:3px; }
.shop-item { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-radius:9px; background:#ffffff08; margin:3px 0; border:1px solid #ff660018; }
.shop-item-info { display:flex; align-items:center; gap:9px; color:#ffeecc; font-size:0.85rem; }
.shop-item-icon { font-size:1.4rem; line-height:1; }
.shop-item-cost { color:#ffcc66; font-size:0.78rem; display:block; }
.buy-btn { background:#cc4400; border:none; border-radius:7px; padding:5px 12px; color:#fff; font-size:0.76rem; cursor:pointer; pointer-events:all; flex-shrink:0; }
.buy-btn:disabled { background:#2a2a2a; color:#555; cursor:default; }
.buy-btn.owned { background:#1a3300; color:#77ee77; }
.throwable-anim { position:fixed; font-size:2.2rem; pointer-events:none; z-index:25; animation:throwArc 1.1s ease-in forwards; }
@keyframes throwArc { 0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1;} 45%{transform:translate(var(--tx),var(--ty)) rotate(200deg) scale(1.3);opacity:1;} 100%{transform:translate(var(--tx2),var(--ty2)) rotate(400deg) scale(0.2);opacity:0;} }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="titleScreen" class="screen">
  <h1>🔥 Fireside Follies</h1>
  <p class="sub">The world's most important cooking simulator</p>
  <button class="fire-btn" onclick="showLobby('host')">🏠 Host a Fire</button>
  <button class="fire-btn" onclick="showLobby('join')">🔗 Join a Fire</button>
  <button class="fire-btn secondary" onclick="startSolo()">🦆 Solo Roast</button>
</div>

<div id="lobbyScreen" class="screen hidden">
  <h2 id="lobbyTitle">Host a Fire 🔥</h2>
  <div class="lobby-box">
    <div id="hostNamePanel">
      <input type="text" id="hostNameInput" placeholder="Your name" maxlength="12">
      <button class="fire-btn" onclick="confirmHost()" style="width:100%;margin-top:8px;">Create Lobby</button>
    </div>
    <div id="hostPanel" style="display:none;">
      <p style="color:#ffaa44;font-size:0.82rem;text-align:center;margin-bottom:6px;">Share this code:</p>
      <div class="code-display" id="hostCode">----</div>
      <div id="playersList" class="players-list"></div>
      <button class="fire-btn" id="startGameBtn" onclick="startGame()" style="width:100%;margin-top:10px;display:none;">🔥 Start Roasting!</button>
    </div>
    <div id="joinPanel" style="display:none;">
      <input type="text" id="joinNameInput" placeholder="Your name" maxlength="12">
      <input type="text" id="joinCodeInput" placeholder="Host code" maxlength="6" style="text-transform:uppercase;letter-spacing:5px;">
      <button class="fire-btn" onclick="joinGame()" style="width:100%;margin-top:8px;">Join the Fire!</button>
    </div>
    <p id="lobbyStatus"></p>
    <button class="fire-btn secondary" onclick="backToTitle()" style="width:100%;margin-top:8px;padding:10px;">← Back</button>
  </div>
</div>

<div id="topHud" class="hidden">
  <div id="commentaryStrip">🔥 Welcome to Fireside Follies!</div>
  <div id="hudRight">
    <div id="pointsBadge">🔥 0 pts</div>
    <button class="hud-btn" onclick="openShop()">🛒 Shop</button>
  </div>
</div>

<div id="shopScreen" class="screen hidden">
  <div class="shop-box">
    <h2>🛒 Fire Shop</h2>
    <p class="shop-pts">Points: <strong id="shopPoints">0</strong> 🔥</p>
    <div class="shop-category">🍖 Unlock Food</div><div id="shopFoodItems"></div>
    <div class="shop-category">🎨 Flame Color</div><div id="shopFlames"></div>
    <div class="shop-category">📏 Fire Size</div><div id="shopFireSize"></div>
    <div class="shop-category">🪄 Stick Skins</div><div id="shopSticks"></div>
    <div class="shop-category">💥 Throwables</div><div id="shopThrowables"></div>
    <button class="fire-btn secondary" onclick="closeShop()" style="width:100%;margin-top:14px;">← Back to Fire</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const HUD_H  = 46;

// ── State ──
const S = {
  running:false, points:0,
  fireSize:1.0, flameColor:'natural', stickSkin:'wood',
  selectedFood:'none', cookProgress:0, cookStage:0,
  hasFoodOnStick:false, isOnFire:false, fireIntensity:0,
  stickX:0, stickY:0, dragging:false,
  particles:[], sparks:[],
  throwableEffect:null, throwableTs:0,
  peer:null, connections:[], players:[], isHost:false, myName:'Player', soloMode:false,
  W:0, H:0, sandY:0, fireY:0,
  foodStackX:0, foodStackBaseY:0,
  tickAlpha:0, tickText:'', tickColor:'#ffcc66',
  servedAlpha:0, servedEmoji:'', servedText:'',
};

const FOOD = {
  marshmallow:{ name:'Marshmallow', rawColor:'#f0f0f0', shape:'square',
    stages:['⬜','🟡','🟠','🟤','🟫','🍥','⬛'],
    comments:[
      ["Still raw. Is this a snowball?","Cold marshmallow. COLD.","I've seen more effort from a sloth."],
      ["Getting a tan! Like a cloud in Florida.","Your marshmallow visited the sun.","Slightly warm. Adorable."],
      ["Toasty! The outer skin is crackling!","That golden color is *chef's kiss*.","You're a marshmallow whisperer."],
      ["Golden perfection! You nailed it!","Magnificently gooey in the middle!","Museums will display this."],
      ["Slightly overdone but I respect it.","Well done! Literally.","A little charred but still edible."],
      ["PERFECT! Platonic ideal of roasted marshmallow!","The angels are weeping with joy!","Frame it. Eat it. Weep."],
      ["Pure carbon. It's ART.","You invented a new element.","That's not food. That's a warning."],
    ], pts:[0,50,80,120,100,200,10] },
  hotdog:{ name:'Hot Dog', rawColor:'#e8a07a', shape:'rectangle',
    stages:['🌭','🟡','🟠','🟤','🟫','🍖','💀'],
    comments:[
      ["That's barely a warm frank. Embarrassing.","Technically edible. Technically.","Dogs everywhere are confused."],
      ["Getting some color! Looking like a sausage!","Pink inside. Like a sunburned tourist.","Barely cooked but hey, start."],
      ["Nice sizzle! The juices are flowing!","Grade A tube steak situation.","That's a proper hot dog!"],
      ["CRISPY skin, juicy inside. PERFECTION!","A hot dog Michelangelo would eat.","That dog is DONE right!"],
      ["Getting leather-jacket vibes...","It has the texture of a garden hose.","Chewy but committed. Respect."],
      ["PERFECT ROAST! Open a cart in NYC!","Museum-quality frankfurter.","This hot dog changed my life."],
      ["It's a cinder. A sad little cinder.","Ashes to ashes, dog to dust.","Your hot dog achieved enlightenment."],
    ], pts:[0,45,75,110,95,190,10] },
  iguana:{ name:'Iguana', rawColor:'#5a9e5a', shape:'oval',
    stages:['🦎','🟡','🟠','🟤','🟫','✨','💀'],
    comments:[
      ["The iguana looks... confused.","Technically still blinking.","I think it waved at me."],
      ["Getting warm! Still has personality.","A gently warmed lizard. For the adventurous.","It smells like a hiking trail."],
      ["Now we're cooking! Great sizzle!","Iguana cuisine is underrated. Pioneer.","It's turning a lovely terracotta."],
      ["Beautifully roasted! Juicy and fragrant!","Top-tier lizard. Gordon would be proud.","The iguana chef community salutes you!"],
      ["Charred on the spiky bits.","Too crunchy. WAY too crunchy.","Like jerky but with more dignity."],
      ["FLAWLESS iguana roast! Rarest achievement!","12/10. It died for something beautiful.","This is a spiritual experience."],
      ["It's black. Everything is black.","The lizard became the universe.","Its ghost haunts this fire forever."],
    ], pts:[0,60,90,140,110,250,15] },
  smore:{ name:"S'more", rawColor:'#c8a87a', shape:'square',
    stages:['🍪','🟡','🟠','🔶','🟤','⭐','💀'],
    comments:[
      ["Cold chocolate and raw marshmallow. Chaos.","Not a s'more. A cold sadness sandwich.","This is not camping. This is failure."],
      ["The chocolate is starting to melt! Promising!","Like a warm hug from a questionable friend.","Getting there. Maybe."],
      ["Ooh! Gooey center forming! YES!","The chocolate MELTS. The marshmallow TOASTS.","This is becoming something beautiful."],
      ["GOLDEN! GOOEY! GLORIOUS!","A s'more Shakespeare would eat.","Everything I have ever wanted."],
      ["Too far! The graham cracker is a weapon!","This could cut glass.","Crunchy and sad."],
      ["PERFECT S'MORE! Holy Grail of campfire!","I'm crying. This is perfect.","You ARE the s'more."],
      ["S'more? More like s'gone.","It transcended snack.","Carbon compound, graham cracker notes."],
    ], pts:[0,70,110,160,120,280,20] },
};

const STAGES = ['Raw','Rare','Medium Rare','Medium','Well Done','Perfectly Done','CREMATED'];
const STAGE_COLORS = ['#aaaaaa','#ff9966','#ff7733','#ee5500','#cc3300','#ffcc00','#444444'];

const SHOP = {
  food:[ {id:'smore',icon:'🍪',name:"S'more",cost:300} ],
  flames:[ {id:'blue',icon:'🔵',name:'Blue Flame',cost:150},{id:'green',icon:'🟢',name:'Green Flame',cost:150},{id:'purple',icon:'🟣',name:'Purple Flame',cost:150},{id:'rainbow',icon:'🌈',name:'Rainbow Flame',cost:400} ],
  fireSize:[ {id:'big',icon:'📈',name:'Bigger Fire +25%',cost:200},{id:'huge',icon:'🔥',name:'Massive Fire +50%',cost:450} ],
  sticks:[ {id:'neon',icon:'💡',name:'Neon Stick',cost:100},{id:'diamond',icon:'💎',name:'Diamond Stick',cost:300},{id:'candy',icon:'🍬',name:'Candy Cane Stick',cost:150} ],
  throwables:[ {id:'fireworks',icon:'🎆',name:'Fireworks',cost:80},{id:'duck',icon:'🦆',name:'Rubber Duck',cost:60},{id:'disco',icon:'🪩',name:'Disco Ball',cost:120},{id:'butter',icon:'🧈',name:'Stick of Butter',cost:50},{id:'pinata',icon:'🎊',name:'Pinata',cost:90} ],
};

const owned = {
  flames:new Set(['natural']), fireSize:new Set(), sticks:new Set(['wood']),
  throwables:new Set(), food:new Set(['marshmallow','hotdog','iguana']),
};

// ── Layout ──
const FOOD_STACK_LIST = [
  {key:'marshmallow', color:'#f0f0f0', border:'#bbbbbb'},
  {key:'hotdog',      color:'#d87848', border:'#a04820'},
  {key:'iguana',      color:'#4a9a50', border:'#2a6028'},
  {key:'smore',       color:'#c49050', border:'#8a5822'},
];
const ITEM_W = 42, ITEM_H = 42, ITEM_GAP = 10;

function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  S.W = canvas.width; S.H = canvas.height;
  S.sandY  = Math.floor(S.H * 0.80);
  S.fireY  = S.sandY;
  S.foodStackX   = S.W - ITEM_W/2 - 8;
  S.foodStackBaseY = HUD_H + 20;
  if(!S.dragging){
    S.stickX = S.W * 0.45;
    S.stickY = S.fireY - 140 * S.fireSize;
  }
}
window.addEventListener('resize', resize);
resize();

// ── Particles ──
function spawnParticle(){
  const cx=S.W/2, spread=60*S.fireSize;
  S.particles.push({
    x:cx+(Math.random()-0.5)*spread*2, y:S.fireY-5,
    vx:(Math.random()-0.5)*2.2,
    vy:-(Math.random()*4+2.5)*S.fireSize,
    life:1, decay:Math.random()*0.012+0.008,
    size:Math.random()*38+12, cp:Math.random()*Math.PI*2,
  });
}
function spawnSpark(){
  S.sparks.push({
    x:S.W/2+(Math.random()-0.5)*55*S.fireSize, y:S.fireY-10,
    vx:(Math.random()-0.5)*5, vy:-(Math.random()*7+3),
    life:1, decay:Math.random()*0.02+0.012, size:Math.random()*3+1,
  });
}

// ── Flame colour ──
const FC={
  natural:[[255,240,50,1],[255,160,20,0.9],[220,80,10,0.7],[180,40,5,0.35]],
  blue:   [[80,200,255,1],[40,100,220,0.9],[20,60,180,0.7],[10,30,110,0.35]],
  green:  [[100,255,80,1],[40,200,50,0.9],[20,150,30,0.7],[10,80,20,0.35]],
  purple: [[220,80,255,1],[160,40,200,0.9],[100,20,160,0.7],[60,10,100,0.35]],
};
function flameRGBA(life,cp,ts){
  if(S.flameColor==='rainbow'){
    const t=(ts/700+cp)%(Math.PI*2);
    return `rgba(${~~(127+127*Math.sin(t))},${~~(127+127*Math.sin(t+2.1))},${~~(127+127*Math.sin(t+4.2))},${life})`;
  }
  const cols=FC[S.flameColor]||FC.natural;
  const c=cols[Math.min(~~((1-life)*cols.length),cols.length-1)];
  return `rgba(${c[0]},${c[1]},${c[2]},${c[3]*life})`;
}

// ── Draw functions ──
function drawBg(){
  const g=ctx.createRadialGradient(S.W/2,S.H*0.5,0,S.W/2,S.H*0.5,S.H);
  g.addColorStop(0,'#1e0a00'); g.addColorStop(0.55,'#0a0400'); g.addColorStop(1,'#000');
  ctx.fillStyle=g; ctx.fillRect(0,0,S.W,S.H);
  // vignette
  const v=ctx.createRadialGradient(S.W/2,S.H/2,S.H*0.18,S.W/2,S.H/2,S.H*0.88);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=v; ctx.fillRect(0,0,S.W,S.H);
}

function drawSand(){
  const sy=S.sandY, sw=S.W, sh=S.H-sy;
  // main sand
  const g=ctx.createLinearGradient(0,sy,0,S.H);
  g.addColorStop(0,'#8a6035'); g.addColorStop(0.25,'#7a5028'); g.addColorStop(1,'#3a1e08');
  ctx.fillStyle=g; ctx.fillRect(0,sy,sw,sh);
  // subtle texture pebbles
  ctx.save(); ctx.globalAlpha=0.12;
  for(let i=0;i<200;i++){
    const tx=((i*97.3)%1)*sw;
    const ty=sy+((i*53.7)%1)*sh;
    ctx.fillStyle=i%2===0?'#d4a060':'#2a1005';
    ctx.beginPath(); ctx.arc(tx,ty,(i%3)*0.8+0.4,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // fire light on sand
  const gl=ctx.createRadialGradient(S.W/2,sy,0,S.W/2,sy,200*S.fireSize);
  gl.addColorStop(0,'rgba(255,110,0,0.3)'); gl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gl; ctx.fillRect(0,sy,sw,sh);
  // dark edge where sand meets fire
  const edge=ctx.createLinearGradient(0,sy,0,sy+22);
  edge.addColorStop(0,'rgba(0,0,0,0.5)'); edge.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=edge; ctx.fillRect(0,sy,sw,22);
}

function drawLogs(ts){
  const cx=S.W/2, fy=S.fireY, fs=S.fireSize;
  const defs=[
    {ox:-55,oy:5, w:105,h:16,rot:-0.15,c:'#4a2000'},
    {ox:14, oy:4, w:90, h:15,rot:0.22, c:'#3a1800'},
    {ox:-32,oy:13,w:118,h:15,rot:0.05, c:'#5a2c00'},
  ];
  defs.forEach(l=>{
    ctx.save();
    ctx.translate(cx+l.ox*fs, fy+l.oy);
    ctx.rotate(l.rot);
    ctx.shadowBlur=18; ctx.shadowColor='#ff4400';
    ctx.fillStyle=l.c;
    ctx.beginPath(); ctx.ellipse(0,0,l.w*fs/2,l.h/2,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle=`rgba(255,80,0,${0.25+0.12*Math.sin(ts/280+l.rot*5)})`;
    ctx.beginPath(); ctx.ellipse(0,-1,l.w*fs/2-3,l.h/2-2,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawFire(ts){
  const cx=S.W/2, fy=S.fireY, fs=S.fireSize;
  // ground halo
  const gr=ctx.createRadialGradient(cx,fy,0,cx,fy,170*fs);
  gr.addColorStop(0,'rgba(255,120,0,0.3)'); gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.ellipse(cx,fy,170*fs,40*fs,0,0,Math.PI*2); ctx.fill();

  const rate=Math.max(2,~~(5*fs));
  for(let i=0;i<rate;i++) spawnParticle();
  if(Math.random()<0.3) spawnSpark();

  S.particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    const g2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
    g2.addColorStop(0,flameRGBA(1,p.cp,ts));
    g2.addColorStop(0.5,flameRGBA(p.life*0.6,p.cp,ts));
    g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  S.sparks.forEach(s=>{
    ctx.save(); ctx.globalAlpha=s.life;
    ctx.fillStyle=`rgb(255,${~~(200*s.life)},40)`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ── Food stack on right edge ──
function drawFoodStack(){
  let y=S.foodStackBaseY;
  FOOD_STACK_LIST.forEach(fd=>{
    if(!owned.food.has(fd.key)) return;
    const x=S.foodStackX, hw=ITEM_W/2, hh=ITEM_H/2;
    // glow if stick tip is close
    const near=!S.hasFoodOnStick && Math.abs(S.stickX-x)<44 && Math.abs(S.stickY-y)<44;
    ctx.save();
    if(near){ ctx.shadowBlur=18; ctx.shadowColor='#ffdd66'; }
    ctx.strokeStyle=fd.border; ctx.lineWidth=2;
    ctx.fillStyle=fd.color;
    rr(ctx,x-hw,y-hh,ITEM_W,ITEM_H,6); ctx.fill(); ctx.stroke();
    // food name first char label
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.font=`bold 10px Georgia`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(FOOD[fd.key].name.substring(0,4), x, y);
    ctx.restore();
    y+=ITEM_H+ITEM_GAP;
  });
}

// ── Stick & food on stick ──
function drawStick(ts){
  const sx=S.stickX, sy=S.stickY;
  const hx=S.W*0.92, hy=S.fireY+20;
  const skin=S.stickSkin;
  ctx.save();
  ctx.lineWidth=6; ctx.lineCap='round';
  if(skin==='neon'){
    ctx.strokeStyle='#00ffff'; ctx.shadowBlur=16; ctx.shadowColor='#00ffff';
  } else if(skin==='diamond'){
    const dg=ctx.createLinearGradient(sx,sy,hx,hy);
    dg.addColorStop(0,'#aaf0ff'); dg.addColorStop(0.5,'#fff'); dg.addColorStop(1,'#88ccff');
    ctx.strokeStyle=dg; ctx.shadowBlur=10; ctx.shadowColor='#aaeeff';
  } else if(skin==='candy'){
    const cg=ctx.createLinearGradient(sx,sy,hx,hy);
    cg.addColorStop(0,'#ff3333'); cg.addColorStop(0.25,'#fff'); cg.addColorStop(0.5,'#ff3333'); cg.addColorStop(0.75,'#fff'); cg.addColorStop(1,'#ff3333');
    ctx.strokeStyle=cg;
  } else {
    ctx.strokeStyle='#8B4513'; ctx.shadowBlur=4; ctx.shadowColor='#442200';
  }
  ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(sx,sy); ctx.stroke();
  ctx.restore();
  // tip
  if(S.hasFoodOnStick) drawFoodOnStick(ts,sx,sy);
  else { ctx.save(); ctx.fillStyle='#c8943a'; ctx.beginPath(); ctx.arc(sx,sy,5,0,Math.PI*2); ctx.fill(); ctx.restore(); }
}

function drawFoodOnStick(ts,sx,sy){
  const fd=FOOD[S.selectedFood]; if(!fd) return;
  const stage=Math.min(S.cookStage,6);
  const sz=24+5*S.fireSize;
  const bounce=S.isOnFire ? Math.sin(ts/65)*2.5 : 0;
  ctx.save();
  ctx.translate(sx, sy+bounce);
  if(S.isOnFire){ ctx.shadowBlur=24; ctx.shadowColor='#ff4400'; }
  const shade=cookShade(fd.rawColor, S.cookProgress/100);
  ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1.5;
  ctx.fillStyle=shade;

  if(fd.shape==='square'){
    rr(ctx,-sz/2,-sz/2,sz,sz,5); ctx.fill(); ctx.stroke();
    if(stage>=4){ ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-sz*0.3,-sz*0.15); ctx.lineTo(sz*0.3,-sz*0.15); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-sz*0.3,sz*0.1); ctx.lineTo(sz*0.3,sz*0.1); ctx.stroke(); }
    if(S.isOnFire){ ctx.globalAlpha=0.3+0.18*Math.sin(ts/50); ctx.fillStyle='rgba(255,120,0,0.6)'; rr(ctx,-sz/2,-sz/2,sz,sz,5); ctx.fill(); }
  } else if(fd.shape==='rectangle'){
    rr(ctx,-sz*0.75,-sz*0.3,sz*1.5,sz*0.6,6); ctx.fill(); ctx.stroke();
    if(stage>=3){ ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5; [-0.28,0,0.28].forEach(o=>{ ctx.beginPath(); ctx.moveTo(o*sz,-sz*0.3); ctx.lineTo(o*sz,sz*0.3); ctx.stroke(); }); }
    if(S.isOnFire){ ctx.globalAlpha=0.28+0.15*Math.sin(ts/50); ctx.fillStyle='rgba(255,120,0,0.5)'; rr(ctx,-sz*0.75,-sz*0.3,sz*1.5,sz*0.6,6); ctx.fill(); }
  } else {
    ctx.beginPath(); ctx.ellipse(0,0,sz*0.65,sz*0.38,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    if(stage>=3){ ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(-sz*0.35,0); ctx.lineTo(sz*0.35,0); ctx.stroke(); }
    if(S.isOnFire){ ctx.globalAlpha=0.28+0.15*Math.sin(ts/50); ctx.fillStyle='rgba(255,140,0,0.45)'; ctx.beginPath(); ctx.ellipse(0,0,sz*0.65,sz*0.38,0,0,Math.PI*2); ctx.fill(); }
  }
  ctx.restore();
  // cook bar — anchored above the food item
  if(S.running){
    const bw=84, bh=7, bx=sx-bw/2, by=sy-sz-26;
    ctx.save(); ctx.globalAlpha=0.85;
    ctx.fillStyle='#00000077'; rr(ctx,bx,by,bw,bh,4); ctx.fill();
    ctx.fillStyle=STAGE_COLORS[stage]; rr(ctx,bx,by,bw*(S.cookProgress/100),bh,4); ctx.fill();
    ctx.restore();
  }
}

function cookShade(hex,t){
  const r0=parseInt(hex.slice(1,3),16), g0=parseInt(hex.slice(3,5),16), b0=parseInt(hex.slice(5,7),16);
  const r=~~(r0+(30-r0)*Math.min(1,t*1.1)), g=~~(g0+(18-g0)*Math.min(1,t*1.1)), b=~~(b0+(5-b0)*Math.min(1,t*1.1));
  return `rgb(${r},${g},${b})`;
}

function rr(c,x,y,w,h,r){
  c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r); c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h); c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r); c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}

// ── HUD on canvas ──
function drawHudCanvas(ts){
  // tick (stage change) fades out
  if(S.tickAlpha>0){
    ctx.save(); ctx.globalAlpha=Math.min(1,S.tickAlpha);
    ctx.font=`bold ${clamp(13,S.W*0.038,20)}px Georgia`;
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle=S.tickColor; ctx.shadowBlur=10; ctx.shadowColor='#000';
    ctx.fillText(S.tickText, 14, HUD_H+16);
    ctx.restore();
  }
  // served food flash (lower mid area, above sand)
  if(S.servedAlpha>0){
    ctx.save(); ctx.globalAlpha=Math.min(1,S.servedAlpha);
    ctx.font=`bold ${clamp(18,S.W*0.045,30)}px Georgia`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#ffdd88'; ctx.shadowBlur=18; ctx.shadowColor='#000';
    ctx.fillText(S.servedEmoji+'  '+S.servedText, S.W/2, S.sandY-52);
    ctx.restore();
  }
}

// ── Throwable effects ──
function drawThrowable(ts){
  if(!S.throwableEffect) return;
  const age=ts-S.throwableTs;
  if(age>3500){ S.throwableEffect=null; return; }
  const prog=age/3500, id=S.throwableEffect;
  if(id==='fireworks'){
    if(Math.random()<0.45) for(let i=0;i<5;i++) S.sparks.push({x:S.W*(0.15+Math.random()*0.7),y:S.fireY-40-Math.random()*170,vx:(Math.random()-0.5)*9,vy:-(Math.random()*8+2),life:1,decay:0.02,size:Math.random()*5+2});
  } else if(id==='disco'){
    ctx.save(); ctx.globalAlpha=(1-prog)*0.5;
    for(let i=0;i<10;i++){ const a=(i/10)*Math.PI*2+ts/380; const rd=75+22*Math.sin(ts/160); ctx.fillStyle=`hsl(${i*36+ts/8},100%,58%)`; ctx.beginPath(); ctx.arc(S.W/2+Math.cos(a)*rd,S.fireY-55+Math.sin(a)*rd*0.38,11,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  } else if(id==='duck'){
    ctx.save(); ctx.globalAlpha=1-prog;
    ctx.font=`${~~((1-prog)*70+14)}px serif`; ctx.textAlign='center';
    ctx.fillText('🦆',S.W/2,S.fireY-75-prog*110);
    ctx.restore();
  } else if(id==='pinata'){
    ctx.save(); const candy=['🍬','🍭','🍡','🍩','🍪'];
    for(let i=0;i<6;i++){ const cx2=S.W*(0.08+0.84*((i*0.18+prog*0.65)%1)); const cy2=(S.fireY-200)+prog*240+i*28; ctx.globalAlpha=Math.max(0,1-prog*1.7+0.15); ctx.font='22px serif'; ctx.textAlign='center'; ctx.fillText(candy[i%candy.length],cx2,cy2%S.H); }
    ctx.restore();
  }
}

// ── Physics ──
let lastStage=-1;
function updatePhysics(ts,dt){
  S.particles.forEach(p=>{ p.x+=p.vx+Math.sin(ts/470+p.y/55)*0.6; p.y+=p.vy; p.vy*=0.986; p.life-=p.decay; p.size*=0.994; });
  S.particles=S.particles.filter(p=>p.life>0);
  S.sparks.forEach(s=>{ s.x+=s.vx; s.y+=s.vy; s.vy+=0.18; s.life-=s.decay; });
  S.sparks=S.sparks.filter(s=>s.life>0);
  if(S.tickAlpha>0) S.tickAlpha-=dt*0.0007;
  if(S.servedAlpha>0) S.servedAlpha-=dt*0.00055;

  if(!S.running||!S.hasFoodOnStick) { S.isOnFire=false; S.fireIntensity=0; return; }

  // butter boost
  let butterBoost=0;
  if(S.throwableEffect==='butter'){ const age=ts-S.throwableTs; if(age<3500) butterBoost=0.5*(1-age/3500); }

  const fireTop=S.fireY-(200+butterBoost*90)*S.fireSize;
  const dist=S.stickY-fireTop;
  S.fireIntensity=Math.max(0, 1-dist/(180*S.fireSize));
  S.isOnFire=S.fireIntensity>0.88;

  if(S.fireIntensity>0.03){
    S.cookProgress=Math.min(100, S.cookProgress+S.fireIntensity*0.065);
    const ns=Math.min(6,~~(S.cookProgress/(100/6)));
    if(ns!==S.cookStage){
      S.cookStage=ns;
      if(ns!==lastStage){
        showTick(STAGES[ns], STAGE_COLORS[ns]);
        doCommentary();
        lastStage=ns;
      }
    }
  }
}

function showTick(text,color){ S.tickText=text; S.tickColor=color||'#ffcc66'; S.tickAlpha=2.8; }

// ── Commentary ──
const commentEl=document.getElementById('commentaryStrip');
let lastComTs=0;
function doCommentary(){
  const fd=FOOD[S.selectedFood]; if(!fd) return;
  const idx=Math.min(S.cookStage,6);
  const lines=fd.comments[idx];
  const line=lines[~~(Math.random()*lines.length)];
  commentEl.textContent='💬 "'+line+'"';
  if(window.speechSynthesis){ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(line); u.rate=1.1; u.pitch=1.15; u.volume=0.55; speechSynthesis.speak(u); }
  lastComTs=performance.now();
}
function tickCommentary(ts){
  if(!S.running) return;
  if(ts-lastComTs>8000 && S.hasFoodOnStick) doCommentary();
}

// ── Audio ──
let audioCtx=null;
function initAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  playFireNoise(); schedCrackle();
}
function playFireNoise(){
  const len=audioCtx.sampleRate*2, buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*0.1;
  const src=audioCtx.createBufferSource(); src.buffer=buf; src.loop=true;
  const f=audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=380;
  const g=audioCtx.createGain(); g.gain.value=0.28;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start();
}
function schedCrackle(){ setTimeout(()=>{playCrackle();schedCrackle();},900+Math.random()*2400); }
function playCrackle(){
  if(!audioCtx) return;
  const dur=0.07+Math.random()*0.1, buf=audioCtx.createBuffer(1,~~(audioCtx.sampleRate*dur),audioCtx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*9);
  const src=audioCtx.createBufferSource(); src.buffer=buf;
  const g=audioCtx.createGain(); g.gain.value=0.4+Math.random()*0.4;
  src.connect(g); g.connect(audioCtx.destination); src.start();
}
function playSizzle(){
  if(!audioCtx) return;
  const buf=audioCtx.createBuffer(1,~~(audioCtx.sampleRate*0.3),audioCtx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*2.2)*0.25;
  const src=audioCtx.createBufferSource(); src.buffer=buf;
  const f=audioCtx.createBiquadFilter(); f.type='highpass'; f.frequency.value=1100;
  const g=audioCtx.createGain(); g.gain.value=0.6;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start();
}

// ── Pickup ──
function tryPickup(tx,ty){
  let y=S.foodStackBaseY;
  for(const fd of FOOD_STACK_LIST){
    if(!owned.food.has(fd.key)){y+=ITEM_H+ITEM_GAP;continue;}
    if(Math.abs(tx-S.foodStackX)<ITEM_W*0.85 && Math.abs(ty-y)<ITEM_H*0.85){
      S.selectedFood=fd.key; S.hasFoodOnStick=true;
      S.cookProgress=0; S.cookStage=0; lastStage=-1;
      showTick(FOOD[fd.key].name+' on stick!','#ffcc66');
      commentEl.textContent='💬 "A fresh '+FOOD[fd.key].name+'! Hold it over the fire... carefully."';
      return true;
    }
    y+=ITEM_H+ITEM_GAP;
  }
  return false;
}

// ── Serve ──
function serveFood(){
  if(!S.hasFoodOnStick||S.cookProgress<5) return;
  const fd=FOOD[S.selectedFood]; if(!fd) return;
  const stage=Math.min(S.cookStage,6), pts=fd.pts[stage];
  S.points+=pts;
  document.getElementById('pointsBadge').textContent='🔥 '+S.points+' pts';
  S.servedEmoji=fd.stages[stage]; S.servedText=STAGES[stage]+'! +'+pts+' pts'; S.servedAlpha=3.2;
  const line=fd.comments[stage][~~(Math.random()*fd.comments[stage].length)];
  commentEl.textContent='💬 "'+line+'"';
  if(window.speechSynthesis){ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(line); u.rate=1.1; u.pitch=1.2; speechSynthesis.speak(u); }
  S.hasFoodOnStick=false; S.selectedFood='none'; S.cookProgress=0; S.cookStage=0; lastStage=-1;
}

// ── Input ──
canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); initAudio();
  const t=e.touches[0];
  if(!S.hasFoodOnStick && S.running && tryPickup(t.clientX,t.clientY)) return;
  S.dragging=true; S.stickX=t.clientX; S.stickY=t.clientY;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault(); if(!S.dragging) return;
  const t=e.touches[0]; S.stickX=t.clientX; S.stickY=Math.min(t.clientY,S.sandY+12);
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault(); S.dragging=false;
  if(S.hasFoodOnStick && S.cookProgress>=5) serveFood();
},{passive:false});
canvas.addEventListener('mousedown',e=>{
  initAudio();
  if(!S.hasFoodOnStick && S.running && tryPickup(e.clientX,e.clientY)) return;
  S.dragging=true; S.stickX=e.clientX; S.stickY=e.clientY;
});
canvas.addEventListener('mousemove',e=>{ if(!S.dragging) return; S.stickX=e.clientX; S.stickY=Math.min(e.clientY,S.sandY+12); });
canvas.addEventListener('mouseup',()=>{ S.dragging=false; if(S.hasFoodOnStick && S.cookProgress>=5) serveFood(); });

// ── Main loop ──
let prevTs=0;
function loop(ts){
  const dt=Math.min(ts-prevTs,80); prevTs=ts;
  ctx.clearRect(0,0,S.W,S.H);
  drawBg();
  drawFire(ts);
  drawLogs(ts);
  drawSand();
  if(S.running){
    drawFoodStack();
    drawStick(ts);
    drawThrowable(ts);
    drawHudCanvas(ts);
    updatePhysics(ts,dt);
    tickCommentary(ts);
    if(S.isOnFire && Math.random()<0.024) playSizzle();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Shop ──
function openShop(){ document.getElementById('shopScreen').classList.remove('hidden'); renderShop(); }
function closeShop(){ document.getElementById('shopScreen').classList.add('hidden'); }
function renderShop(){
  document.getElementById('shopPoints').textContent=S.points;
  const row=(item,cat,action,isOwned,active,canAfford)=>`<div class="shop-item"><div class="shop-item-info"><span class="shop-item-icon">${item.icon}</span><span>${item.name}<span class="shop-item-cost"> ${item.cost} pts</span></span></div><button class="buy-btn${isOwned?' owned':''}" onclick="${action}" ${(!isOwned&&!canAfford)?'disabled':''}>${isOwned?(active?'▶ Active':cat==='throwables'?'🔥 Throw!':'Use'):'Buy'}</button></div>`;
  document.getElementById('shopFoodItems').innerHTML=SHOP.food.map(i=>row(i,'food',`buyItem('food','${i.id}',${i.cost})`,owned.food.has(i.id),false,S.points>=i.cost)).join('');
  document.getElementById('shopFlames').innerHTML=SHOP.flames.map(i=>row(i,'flames',owned.flames.has(i.id)?`setFlame('${i.id}')`:`buyItem('flames','${i.id}',${i.cost})`,owned.flames.has(i.id),S.flameColor===i.id,S.points>=i.cost)).join('');
  document.getElementById('shopFireSize').innerHTML=SHOP.fireSize.map(i=>row(i,'fireSize',`buyItem('fireSize','${i.id}',${i.cost})`,owned.fireSize.has(i.id),false,S.points>=i.cost)).join('');
  document.getElementById('shopSticks').innerHTML=SHOP.sticks.map(i=>row(i,'sticks',owned.sticks.has(i.id)?`setStick('${i.id}')`:`buyItem('sticks','${i.id}',${i.cost})`,owned.sticks.has(i.id),S.stickSkin===i.id,S.points>=i.cost)).join('');
  document.getElementById('shopThrowables').innerHTML=SHOP.throwables.map(i=>row(i,'throwables',owned.throwables.has(i.id)?`throwItem('${i.id}');closeShop()`:`buyItem('throwables','${i.id}',${i.cost})`,owned.throwables.has(i.id),false,S.points>=i.cost)).join('');
}
function buyItem(cat,id,cost){
  if(S.points<cost) return; S.points-=cost;
  document.getElementById('pointsBadge').textContent='🔥 '+S.points+' pts';
  owned[cat].add(id);
  if(cat==='food') owned.food.add(id);
  if(cat==='flames') setFlame(id);
  if(cat==='fireSize'){ if(id==='big') S.fireSize=1.25; if(id==='huge') S.fireSize=1.5; }
  if(cat==='sticks') setStick(id);

}
function setFlame(id){ S.flameColor=id; closeShop(); }
function setStick(id){ S.stickSkin=id; closeShop(); }

// ── Throwables ──
const THROW_LINES={fireworks:["KABOOM! 4th of July in the living room!","Sparks EVERYWHERE! My eyebrows!"],duck:["A DUCK?! Gary the Duck has... moved on.","The quacking has stopped. Forever."],disco:["SATURDAY NIGHT FEEEEEVER! Dance, flames!","John Travolta is somewhere smiling."],butter:["GREASE FIRE! 40% butter now!","Gordon Ramsay just fainted."],pinata:["CANDY RAIN! The fire APPROVES!","Is that a jawbreaker in my hotdog?! YES."]};

// ── Multiplayer ──
function showLobby(mode){
  document.getElementById('titleScreen').classList.add('hidden');

}
function backToTitle(){ document.getElementById('lobbyScreen').classList.add('hidden'); document.getElementById('titleScreen').classList.remove('hidden'); if(S.peer){S.peer.destroy();S.peer=null;} S.connections=[];S.players=[]; }
function confirmHost(){
  const name=document.getElementById('hostNameInput').value.trim()||'Host'; S.myName=name;
  document.getElementById('hostNamePanel').style.display='none'; document.getElementById('hostPanel').style.display='block';
  document.getElementById('lobbyStatus').textContent='Connecting...'; loadPeer(()=>setupHost());
}
function loadPeer(cb){ if(window.Peer){cb();return;} const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js'; s.onload=cb; document.head.appendChild(s); }
function setupHost(){
  const code=Math.random().toString(36).substr(2,5).toUpperCase(); const peer=new Peer('ff-'+code,{debug:0}); S.peer=peer;
  peer.on('open',()=>{ document.getElementById('hostCode').textContent=code; document.getElementById('lobbyStatus').textContent='Waiting for players...'; S.players=[{name:S.myName,id:'host'}]; renderList(); document.getElementById('startGameBtn').style.display='block'; });
  peer.on('connection',conn=>{ S.connections.push(conn); conn.on('data',d=>{ if(d.type==='join'){S.players.push({name:d.name,id:conn.peer});renderList();broadcast({type:'players',players:S.players});document.getElementById('lobbyStatus').textContent=S.players.length+'/4 players';} }); conn.on('close',()=>{S.connections=S.connections.filter(c=>c!==conn);S.players=S.players.filter(p=>p.id!==conn.peer);renderList();}); });
  peer.on('error',e=>{ document.getElementById('lobbyStatus').textContent='Error: '+e.type; });
}
function joinGame(){
  const name=document.getElementById('joinNameInput').value.trim()||'Guest'; const code=document.getElementById('joinCodeInput').value.trim().toUpperCase(); S.myName=name;
  if(!code){document.getElementById('lobbyStatus').textContent='Enter a code!';return;}
  document.getElementById('lobbyStatus').textContent='Connecting...';
  loadPeer(()=>{ const peer=new Peer({debug:0}); S.peer=peer; peer.on('open',()=>{ const conn=peer.connect('ff-'+code); conn.on('open',()=>{conn.send({type:'join',name});document.getElementById('lobbyStatus').textContent='Connected! Waiting...';});conn.on('data',d=>{if(d.type==='players'){S.players=d.players;renderList();}if(d.type==='start')startGame();}); }); });
}
function broadcast(d){ S.connections.forEach(c=>{try{c.send(d);}catch(e){}}); }
function renderList(){ let h=''; for(let i=0;i<4;i++){const p=S.players[i];h+=`<div class="player-slot"><div class="player-dot${p?'':' empty'}"></div>${p?p.name:'Waiting...'}</div>`;} document.getElementById('playersList').innerHTML=h; }

function startGame(){
  if(S.isHost) broadcast({type:'start'});
  document.getElementById('lobbyScreen').classList.add('hidden');
  document.getElementById('topHud').classList.remove('hidden');
  S.running=true; S.cookProgress=0; S.cookStage=0; lastStage=-1;
  S.hasFoodOnStick=false; S.selectedFood='none';
  resize(); initAudio();
  commentEl.textContent='💬 "Grab a food item from the right side and hold it over the fire!"';
}
function startSolo(){
  S.soloMode=true; S.myName='Solo Roaster'; S.players=[{name:'Solo Roaster',id:'solo'}];
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('topHud').classList.remove('hidden');
  S.running=true; S.cookProgress=0; S.cookStage=0; lastStage=-1;
  S.hasFoodOnStick=false; S.selectedFood='none';
  resize(); initAudio();
  commentEl.textContent='💬 "Tap a food item on the right, then drag it over that fire!"';
}

function clamp(a,v,b){ return Math.max(a,Math.min(b,v)); }
</script>
